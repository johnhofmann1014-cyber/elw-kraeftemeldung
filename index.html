<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VSR Meldeboard</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f2f2f2;
  color: #111;
}

.pageCenter {
  width: 100%;
  display: flex;
  justify-content: center;
}

.topWrap {
  width: min(100%, 1180px);
}

.card {
  background: #fff;
  padding: 10px 14px 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.headerRow {
  display: flex;
  justify-content: space-between;
}

.headerTitle h2 {
  margin: 0;
  color: #c4001a;
}

.logoBox img {
  height: 70px;
}

/* STATUS FIX */
.statusLine {
  min-height: 24px;
  margin-top: 8px;
  display: flex;
  align-items: center;
}

.ok { color: #0a7a2f; }
.error { color: #b00020; }

/* BOARD */
.boardViewport {
  display: flex;
  justify-content: center;
}

.boardScaleStage {
  transform-origin: top center;
}

.boardOuter {
  width: 1320px;
  background: #e53935;
  padding: 12px;
  transition: background 0.5s;
}

.flashNew {
  animation: flash 0.8s;
}

@keyframes flash {
  0% { background: #3cb371; }
  100% { background: #e53935; }
}

.boardInner {
  background: #e8e8e8;
  padding: 10px;
}

.boardGrid {
  display: grid;
  grid-template-columns:
    165px 110px 50px 50px 72px 72px 112px 72px 62px 62px 62px 110px;
  column-gap: 25px;
  margin-bottom: 6px;
}

.boardCell {
  border: 3px solid #444;
  min-height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: #e8e8e8;
}

.plusCell {
  position: relative;
}

.plusCell::before {
  content: "+";
  position: absolute;
  left: -25px;
  font-size: 28px;
}
</style>
</head>

<body>

<div class="pageCenter">
<div class="topWrap">

<div class="card">
<div class="headerRow">
<div class="headerTitle">
<h2>VSR Meldeboard</h2>
</div>

<div class="logoBox">
<img src="logo.png">
</div>
</div>

<input id="pw" type="password" placeholder="Passwort eingeben" />

<button onclick="manualLoad()">Laden</button>
<button onclick="copyAllForces()">Kopieren</button>

<div id="status" class="statusLine">
<div class="ok">0 aktuelle Meldung(en) geladen.</div>
</div>

<div style="font-size:12px;color:#666;">
Automatische Aktualisierung alle 10 Sekunden · letzte 6 Stunden
</div>

</div>

<div id="list"></div>

</div>
</div>

<script>
const url = "https://wjqltuuebwxcymdbydwl.supabase.co/functions/v1/elw-read";
const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWx0dXVlYnd4Y3ltZGJ5ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzAwNTgsImV4cCI6MjA4OTI0NjA1OH0.amTfF56s3OlLeE_H8P_-c_hA9M6IEBu9kF2Z7fdiAmk";

let lastLoadedData = [];
const SIX_HOURS = 6 * 60 * 60 * 1000;

/* ====================== */

function parse(line){
  const p = String(line).split(";").map(x=>x.trim());
  return {
    staffel:p[0],
    abk:(p[0]||"").substring(0,3).toUpperCase(),
    ankunft:p[1],
    zf:p[2],
    gf:p[3],
    hf:p[4],
    zh:p[5],
    sth:p[6],
    soh:p[7],
    arzt:p[8],
    br:p[9],
    ta:p[10],
    abreise:p[11]
  }
}

/* ====================== */

function filterData(data){
  const now = Date.now();

  const last6 = data.filter(x=>{
    const t = new Date(x.created_at).getTime();
    return now - t < SIX_HOURS;
  });

  last6.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  const map = new Map();

  last6.forEach(m=>{
    const s = parse(m.meldung).staffel;
    map.set(s,m);
  });

  return Array.from(map.values());
}

/* ====================== */

function render(data,flash=false){

  const rows = data.map(x=>parse(x.meldung));

  const html = rows.map(r=>`
  <div class="boardGrid">
    <div class="boardCell">${r.abk}</div>
    <div class="boardCell">${r.ankunft}</div>
    <div class="boardCell">${r.zf}</div>
    <div class="boardCell">${r.gf}</div>
    <div class="boardCell">${r.hf}</div>
    <div class="boardCell plusCell">${r.zh}</div>
    <div class="boardCell">${r.sth}</div>
    <div class="boardCell">${r.soh}</div>
    <div class="boardCell">${r.arzt}</div>
    <div class="boardCell">${r.br}</div>
    <div class="boardCell">${r.ta}</div>
    <div class="boardCell">${r.abreise}</div>
  </div>
  `).join("");

  document.getElementById("list").innerHTML = `
  <div class="boardViewport">
    <div class="boardScaleStage">
      <div class="boardOuter ${flash ? "flashNew" : ""}">
        <div class="boardInner">
          ${html}
        </div>
      </div>
    </div>
  </div>
  `;
}

/* ====================== */

async function load(){

  const pw = document.getElementById("pw").value;
  const status = document.getElementById("status");

  if(!pw){
    status.innerHTML = "<div class='error'>Passwort fehlt</div>";
    return;
  }

  try{
    const res = await fetch(url,{
      method:"POST",
      headers:{
        "x-elw-password":pw,
        "apikey":apiKey
      }
    });

    const data = await res.json();

    const filtered = filterData(data);

    const oldIds = new Set(lastLoadedData.map(x=>x.id));
    const hasNew = filtered.some(x=>!oldIds.has(x.id));

    lastLoadedData = filtered;

    status.innerHTML = `<div class="ok">${filtered.length} aktuelle Meldung(en) geladen.</div>`;

    render(filtered,hasNew);

  }catch(e){
    status.innerHTML = "<div class='error'>Fehler beim Laden</div>";
  }
}

/* ====================== */

function manualLoad(){
  load();
}

function copyAllForces(){

  if(!lastLoadedData.length){
    alert("Keine Daten vorhanden");
    return;
  }

  const text = lastLoadedData.map(x=>{
    const r = parse(x.meldung);
    return [
      r.staffel,
      r.zf,
      r.gf,
      r.hf,
      r.zh,
      r.sth,
      r.soh
    ].join("\t");
  }).join("\n");

  navigator.clipboard.writeText(text);
  alert("Kopiert");
}

/* ====================== */

setInterval(load,10000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSR Meldeboard</title>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f2f2f2;
      color: #111;
    }

    .pageCenter {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .topWrap {
      width: min(100%, 1180px);
    }

    #list {
      margin-top: 10px;
    }

    .card {
      background: #fff;
      padding: 10px 14px 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .headCard {
      width: 100%;
    }

    .headerRow {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .headerTitle {
      min-width: 0;
      flex: 1;
    }

    .headerTitle h2 {
      margin: 0;
      color: #c4001a;
      line-height: 1.05;
      font-size: 1.65rem;
    }

    .logoBox {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .logoBox img {
      height: 76px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .topControls {
      margin-top: 0;
    }

    input {
      padding: 8px 10px;
      width: 320px;
      max-width: 100%;
      margin-bottom: 8px;
      font-size: 15px;
    }

    button {
      padding: 8px 14px;
      background: #c92222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 2px;
      margin-right: 6px;
      font-size: 14px;
    }

    .buttonRow {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      margin-top: 0;
    }

    .statusLine {
      min-height: 24px;
      margin-top: 8px;
      display: flex;
      align-items: center;
    }

    .ok {
      color: #0a7a2f;
      margin-top: 0;
      font-size: 14px;
    }

    .muted {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
    }

    .meldeboardShell {
      width: 100%;
    }

    .boardViewport {
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .boardScaleStage {
      transform-origin: top center;
    }

    .boardOuter {
      width: 1320px;
      background: #e53935;
      padding: 12px;
      transition: background-color 0.5s ease;
    }

    .flashNew {
      animation: flashGreen 0.8s ease;
    }

    @keyframes flashGreen {
      0% {
        background: #41b95c;
      }
      100% {
        background: #e53935;
      }
    }

    .boardInner {
      background: #e8e8e8;
      padding: 10px 8px 8px;
    }

    .boardTitleWrap {
      display: grid;
      grid-template-columns: 1fr 120px;
      align-items: end;
      gap: 8px;
      margin-bottom: 8px;
    }

    .boardTitle {
      text-align: center;
      font-size: 50px;
      font-weight: 500;
      line-height: 1;
    }

    .boardTitleBox {
      height: 42px;
      border: 3px solid #444;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #111;
    }

    .boardGrid {
      width: 100%;
      display: grid;
      grid-template-columns:
        165px
        110px
        50px
        50px
        72px
        72px
        112px
        72px
        62px
        62px
        62px
        110px;
      column-gap: 25px;
      row-gap: 0;
      align-items: stretch;
    }

    .boardHeader {
      margin-bottom: 6px;
    }

    .boardHeaderCell {
      min-height: 36px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.02;
      padding: 0 2px 2px;
      color: #111;
    }

    .boardRow {
      margin-bottom: 8px;
    }

    .boardCell {
      min-height: 86px;
      border: 3px solid #444;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      font-size: 30px;
      line-height: 1;
      color: #111;
    }

    .boardCell.left {
      justify-content: flex-start;
      align-items: center;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      font-size: 30px;
      padding-left: 10px;
    }

    .boardCell.time {
      font-size: 30px;
    }

    .boardCell.light {
      border-color: #b7b7b7;
    }

    .plusCell {
      position: relative;
    }

    .plusCell::before {
      content: "+";
      position: absolute;
      left: -25px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      line-height: 1;
      font-weight: 700;
      color: #222;
      z-index: 2;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 6px;
      font-size: 23px;
      line-height: 1.28;
      color: #111;
    }

    .legendCol div {
      white-space: nowrap;
      letter-spacing: -0.1px;
    }

    .standRow {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.1;
      text-align: right;
      color: #111;
    }

    .copyArea {
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .topWrap {
        width: 100%;
      }

      .headerTitle h2 {
        font-size: 1.45rem;
      }

      .logoBox img {
        height: 62px;
      }

      input {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="pageCenter">
    <div class="topWrap">
      <div class="card headCard">
        <div class="headerRow">
          <div class="headerTitle">
            <h2>VSR Meldeboard</h2>
          </div>

          <div class="logoBox">
            <img src="logo.png" alt="VSR Logo" />
          </div>
        </div>

        <div class="topControls">
          <input id="pw" type="password" placeholder="Passwort eingeben" />

          <div class="buttonRow">
            <button onclick="manualLoad()">Meldungen laden</button>
            <button onclick="copyAllForces()">alle Kräfte kopieren</button>
            <button onclick="saveBoardAsPdfAndDownload()">als PDF speichern</button>
          </div>

          <div id="status" class="statusLine">
            <div class="ok">0 aktuelle Meldung(en) geladen.</div>
          </div>

          <div class="muted">angezeigt werden nur Meldungen der letzten 6 Stunden</div>
        </div>
      </div>

      <div id="list"></div>
    </div>
  </div>

  <script>
    const url = "https://wjqltuuebwxcymdbydwl.supabase.co/functions/v1/elw-read";
    const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWx0dXVlYnd4Y3ltZGJ5ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzAwNTgsImV4cCI6MjA4OTI0NjA1OH0.amTfF56s3OlLeE_H8P_-c_hA9M6IEBu9kF2Z7fdiAmk";

    let lastLoadedData = [];
    const TOTAL_BOARD_ROWS = 15;
    const AUTO_REFRESH_MS = 10000;
    const SIX_HOURS_MS = 6 * 60 * 60 * 1000;

    function getStaffelAbkuerzung(fullName) {
      const name = String(fullName || "").trim().toLowerCase();

      const map = {
        "brh rhs sachsen ost": "SNO",
        "brh rhs mittelsachsen": "MSN",
        "brh rhs südwestsachsen": "SWS",
        "brh rhs suedwestsachsen": "SWS",
        "brh rhs landkreis leipzig": "LKL",
        "brh rhs kamenzer land": "KML",
        "brh rhs thüringen südost": "TSO",
        "brh rhs thueringen suedost": "TSO",
        "drk rhs leipzig": "RKL",
        "drk rhs aue schwarzenberg": "ASZ",
        "drk rhs freital": "FTL",
        "drk rhs löbau": "LÖB",
        "drk rhs loebau": "LÖB",
        "drk rhs görlitz": "GRL",
        "drk rhs goerlitz": "GRL",
        "dlrg leipzig": "DLL",
        "asb rhs zwickau": "SAZ",
        "asb rhs chemnitz": "SAC",
        "asb rhs dresden": "SAD",
        "asb rhs ostthüringen": "OTH",
        "asb rhs ostthueringen": "OTH",
        "juh rhs leipzig": "JUL",
        "juh rhs dresden": "JDD"
      };

      return map[name] || fullName || "";
    }

    function getTodayDisplayDate() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return `${dd}.${mm}.${yyyy}`;
    }

    function getTodayParts() {
      const now = new Date();
      return {
        yyyy: String(now.getFullYear()),
        mm: String(now.getMonth() + 1).padStart(2, "0"),
        dd: String(now.getDate()).padStart(2, "0")
      };
    }

    function parseForceLine(line) {
      const parts = String(line || "")
        .split(";")
        .map((x) => x.trim());

      const fullStaffelName = parts[0] || "";

      return {
        staffel: fullStaffelName,
        staffelAbk: getStaffelAbkuerzung(fullStaffelName),
        ankunft: parts[1] || "",
        zf: parts[2] || "",
        gf: parts[3] || "",
        hf: parts[4] || "",
        zh: parts[5] || "",
        sth: parts[6] || "",
        soh: parts[7] || "",
        arzt: parts[8] || "",
        berufsretter: parts[9] || "",
        tierarzt: parts[10] || "",
        abreise: parts[11] || ""
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function emptyBoardRow() {
      return {
        staffel: "",
        staffelAbk: "",
        ankunft: "",
        zf: "",
        gf: "",
        hf: "",
        zh: "",
        sth: "",
        soh: "",
        arzt: "",
        berufsretter: "",
        tierarzt: "",
        abreise: ""
      };
    }

    function getMessageTime(item) {
      const raw = item?.created_at || item?.timestamp || item?.time || "";
      const t = new Date(raw).getTime();
      return Number.isFinite(t) ? t : 0;
    }

    function getMessageIdentity(item) {
      return String(item?.id || "") + "|" + String(item?.created_at || item?.timestamp || item?.time || "") + "|" + String(item?.meldung || "");
    }

    function getFilteredMeldungen(data) {
      if (!Array.isArray(data)) return [];

      const now = Date.now();

      const lastSixHours = data.filter((item) => {
        const t = getMessageTime(item);
        if (!t) return false;
        return now - t <= SIX_HOURS_MS;
      });

      lastSixHours.sort((a, b) => getMessageTime(b) - getMessageTime(a));

      const seenStaffeln = new Set();
      const result = [];

      for (const item of lastSixHours) {
        const parsed = parseForceLine(item.meldung);
        const key = parsed.staffel.trim().toLowerCase();

        if (!key) continue;
        if (seenStaffeln.has(key)) continue;

        seenStaffeln.add(key);
        result.push(item);
      }

      return result;
    }

    function buildBoardRows(data) {
      const rows = Array.isArray(data)
        ? data.map((item) => parseForceLine(item.meldung))
        : [];

      while (rows.length < TOTAL_BOARD_ROWS) {
        rows.push(emptyBoardRow());
      }

      return rows.slice(0, TOTAL_BOARD_ROWS);
    }

    function buildSingleRowHtml(r) {
      return `
        <table border="1" style="border-collapse:collapse; font-family:Arial,sans-serif; font-size:11pt;">
          <tr>
            <td style="padding:6px 10px; text-align:left;">${escapeHtml(r.staffel)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.gf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.hf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zh)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.sth)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.soh)}</td>
          </tr>
        </table>
      `;
    }

    function buildSingleRowText(r) {
      return [
        r.staffel,
        r.zf,
        r.gf,
        r.hf,
        r.zh,
        r.sth,
        r.soh
      ].join("\t");
    }

    async function copyHtmlAndText(html, text, successText = "Kopiert") {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([text], { type: "text/plain" }),
          }),
        ]);
        alert(successText);
      } catch {
        try {
          await navigator.clipboard.writeText(text);
          alert(successText);
        } catch {
          alert("Kopieren fehlgeschlagen");
        }
      }
    }

    function renderBoard(data, highlight = false) {
      const list = document.getElementById("list");
      const rows = buildBoardRows(data);
      const flashClass = highlight ? "flashNew" : "";

      const boardRowsHtml = rows.map((row) => {
        return `
          <div class="boardGrid boardRow">
            <div class="boardCell left">${escapeHtml(row.staffelAbk || "")}</div>
            <div class="boardCell time">${escapeHtml(row.ankunft || "")}</div>
            <div class="boardCell">${escapeHtml(row.zf || "")}</div>
            <div class="boardCell">${escapeHtml(row.gf || "")}</div>
            <div class="boardCell">${escapeHtml(row.hf || "")}</div>
            <div class="boardCell plusCell">${escapeHtml(row.zh || "")}</div>
            <div class="boardCell">${escapeHtml(row.sth || "")}</div>
            <div class="boardCell">${escapeHtml(row.soh || "")}</div>
            <div class="boardCell light">${escapeHtml(row.arzt || "")}</div>
            <div class="boardCell light">${escapeHtml(row.berufsretter || "")}</div>
            <div class="boardCell light">${escapeHtml(row.tierarzt || "")}</div>
            <div class="boardCell time">${escapeHtml(row.abreise || "")}</div>
          </div>
        `;
      }).join("");

      list.innerHTML = `
        <div class="meldeboardShell">
          <div class="boardViewport" id="boardViewport">
            <div class="boardScaleStage" id="boardScaleStage">
              <div class="boardOuter ${flashClass}">
                <div class="boardInner">
                  <div class="boardTitleWrap">
                    <div class="boardTitle">Meldeboard</div>
                    <div class="boardTitleBox">${escapeHtml(getTodayDisplayDate())}</div>
                  </div>

                  <div class="boardGrid boardHeader">
                    <div class="boardHeaderCell">StaffelAbk.</div>
                    <div class="boardHeaderCell">Ankunft</div>
                    <div class="boardHeaderCell">ZF</div>
                    <div class="boardHeaderCell">GF</div>
                    <div class="boardHeaderCell">HF</div>
                    <div class="boardHeaderCell">zH</div>
                    <div class="boardHeaderCell">STH</div>
                    <div class="boardHeaderCell">SOH</div>
                    <div class="boardHeaderCell">Arzt</div>
                    <div class="boardHeaderCell">Berufs<br>retter</div>
                    <div class="boardHeaderCell">Tier<br>arzt</div>
                    <div class="boardHeaderCell">Abreise</div>
                  </div>

                  ${boardRowsHtml}

                  <div class="legend">
                    <div class="legendCol">
                      <div>SNO&nbsp; BRH Sachsen-Ost</div>
                      <div>MSN&nbsp; BRH Mittelsachsen</div>
                      <div>SWS&nbsp; BRH Südwestsachsen</div>
                      <div>LKL&nbsp; BRH Landkreis Leipzig</div>
                      <div>KML&nbsp; BRH Kamenzer Land</div>
                      <div>TSO&nbsp; BRH Thüringen Südost</div>
                    </div>

                    <div class="legendCol">
                      <div>RKL&nbsp; DRK Leipzig</div>
                      <div>ASZ&nbsp; DRK Aue Schwarzenberg</div>
                      <div>FTL&nbsp; DRK Freital</div>
                      <div>LÖB&nbsp; DRK Löbau</div>
                      <div>GRL&nbsp; DRK Görlitz</div>
                      <div>DLL&nbsp; DLRG Leipzig</div>
                    </div>

                    <div class="legendCol">
                      <div>SAZ&nbsp; ASB Zwickau</div>
                      <div>SAC&nbsp; ASB Chemnitz</div>
                      <div>SAD&nbsp; ASB Dresden</div>
                      <div>OTH&nbsp; ASB Ostthüringen</div>
                      <div>JUL&nbsp; JUH Leipzig</div>
                      <div>JDD&nbsp; JUH Dresden</div>
                    </div>

                    <div class="legendCol">
                      <div>&nbsp;</div>
                      <div>zH&nbsp; zusätzl. Hunde</div>
                      <div>STH&nbsp; Suchtrupphelfer</div>
                      <div>SOH&nbsp; sonstige Helfer</div>
                    </div>
                  </div>

                  <div class="standRow">Stand 2025_02_28</div>
                </div>
              </div>
            </div>
          </div>

          <div class="copyArea">
            <button type="button" onclick="copyAllForces()">Alle Kräfte kopieren</button>
          </div>
        </div>
      `;

      fitBoardToViewport();
    }

    function fitBoardToViewport() {
      const viewport = document.getElementById("boardViewport");
      const stage = document.getElementById("boardScaleStage");

      if (!viewport || !stage) return;

      const baseWidth = 1320;
      const availableWidth = viewport.clientWidth || 1;
      const autoScale = Math.min(1, availableWidth / baseWidth);
      const extraScale = 0.9;

      stage.style.transform = "scale(1)";
      viewport.style.height = "auto";

      const naturalHeight = stage.scrollHeight || stage.offsetHeight || 1;
      const scale = autoScale * extraScale;

      stage.style.transform = `scale(${scale})`;
      stage.style.transformOrigin = "top center";
      viewport.style.height = `${naturalHeight * scale}px`;
    }

    async function loadMessages(showErrors = false) {
      const password = document.getElementById("pw").value.trim();
      const status = document.getElementById("status");
      const list = document.getElementById("list");

      if (!password) {
        status.innerHTML = '<div class="error">Bitte zuerst Passwort eingeben.</div>';
        return;
      }

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-elw-password": password,
            "apikey": apiKey,
            "Authorization": "Bearer " + apiKey
          },
          body: JSON.stringify({})
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Server liefert keine gültige Antwort.");
        }

        if (!res.ok) {
          throw new Error(data.error || data.message || ("HTTP " + res.status));
        }

        const sourceData = Array.isArray(data) ? data : [];
        const filtered = getFilteredMeldungen(sourceData);

        const oldIds = new Set(lastLoadedData.map(getMessageIdentity));
        const hasNewEntry = filtered.some((item) => !oldIds.has(getMessageIdentity(item)));

        lastLoadedData = filtered;

        status.innerHTML = '<div class="ok">' + filtered.length + ' aktuelle Meldung(en) geladen.</div>';

        if (filtered.length === 0) {
          list.innerHTML = "";
          return;
        }

        renderBoard(filtered, hasNewEntry);

      } catch (err) {
        if (showErrors) {
          status.innerHTML =
            '<div class="error">' +
            (err instanceof Error ? err.message : "Unbekannter Fehler") +
            '</div>';
        }
      }
    }

    async function manualLoad() {
      await loadMessages(true);
    }

    async function copyAllForces() {
      if (!Array.isArray(lastLoadedData) || lastLoadedData.length === 0) {
        alert("Es sind keine aktuellen Kräftemeldungen vorhanden.");
        return;
      }

      const rows = lastLoadedData.map((item) => parseForceLine(item.meldung));

      const htmlTable = `
        <table border="1" style="border-collapse:collapse; font-family:Arial,sans-serif; font-size:11pt;">
          ${rows.map((r) => `
            <tr>
              <td style="padding:6px 10px; text-align:left;">${escapeHtml(r.staffel)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.gf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.hf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zh)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.sth)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.soh)}</td>
            </tr>
          `).join("")}
        </table>
      `;

      const plainText = rows
        .map((r) =>
          [
            r.staffel,
            r.zf,
            r.gf,
            r.hf,
            r.zh,
            r.sth,
            r.soh
          ].join("\t")
        )
        .join("\n");

      await copyHtmlAndText(htmlTable, plainText, "Alle Kräfte als Tabelle kopiert");
    }

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function getRowsForPdf() {
      const rows = lastLoadedData.map((item) => parseForceLine(item.meldung));
      while (rows.length < TOTAL_BOARD_ROWS) {
        rows.push(emptyBoardRow());
      }
      return rows.slice(0, TOTAL_BOARD_ROWS);
    }

    async function saveBoardAsPdfAndDownload() {
      try {
        if (!lastLoadedData.length) {
          alert("Es sind keine aktuellen Kräftemeldungen vorhanden.");
          return;
        }

        const templateUrl = "3_Meldeboard.pdf";
        const existingPdfBytes = await fetch(templateUrl).then((res) => {
          if (!res.ok) throw new Error("PDF-Vorlage konnte nicht geladen werden.");
          return res.arrayBuffer();
        });

        const { PDFDocument, StandardFonts, rgb } = PDFLib;

        const pdfDoc = await PDFDocument.load(existingPdfBytes);
        const page = pdfDoc.getPage(0);
        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

        const { width, height } = page.getSize();

        const startY = height - 140;
        const rowHeight = 47;

        const x = {
          staffel: 55,
          ankunft: 165,
          zf: 245,
          gf: 295,
          hf: 350,
          zh: 415,
          sth: 480,
          soh: 540,
          arzt: 590,
          br: 630,
          ta: 670,
          abreise: 730
        };

        const normal = {
          size: 20,
          font,
          color: rgb(0, 0, 0)
        };

        const small = {
          size: 16,
          font,
          color: rgb(0, 0, 0)
        };

        const rows = getRowsForPdf();

        rows.forEach((row, index) => {
          const y = startY - index * rowHeight - 8;

          if (safeText(row.staffelAbk)) {
            page.drawText(safeText(row.staffelAbk), { x: x.staffel, y, ...normal });
          }

          if (safeText(row.ankunft)) {
            page.drawText(safeText(row.ankunft), { x: x.ankunft, y, ...small });
          }

          if (safeText(row.zf)) {
            page.drawText(safeText(row.zf), { x: x.zf, y, ...normal });
          }

          if (safeText(row.gf)) {
            page.drawText(safeText(row.gf), { x: x.gf, y, ...normal });
          }

          if (safeText(row.hf)) {
            page.drawText(safeText(row.hf), { x: x.hf, y, ...normal });
          }

          if (safeText(row.zh)) {
            page.drawText(safeText(row.zh), { x: x.zh, y, ...normal });
          }

          if (safeText(row.sth)) {
            page.drawText(safeText(row.sth), { x: x.sth, y, ...normal });
          }

          if (safeText(row.soh)) {
            page.drawText(safeText(row.soh), { x: x.soh, y, ...normal });
          }

          if (safeText(row.arzt)) {
            page.drawText(safeText(row.arzt), { x: x.arzt, y, ...small });
          }

          if (safeText(row.berufsretter)) {
            page.drawText(safeText(row.berufsretter), { x: x.br, y, ...small });
          }

          if (safeText(row.tierarzt)) {
            page.drawText(safeText(row.tierarzt), { x: x.ta, y, ...small });
          }

          if (safeText(row.abreise)) {
            page.drawText(safeText(row.abreise), { x: x.abreise, y, ...small });
          }
        });

        const dateParts = getTodayParts();
        const dateText = `${dateParts.dd}.${dateParts.mm}.${dateParts.yyyy}`;

        page.drawText(dateText, {
          x: width - 142,
          y: height - 34,
          size: 14,
          font: boldFont,
          color: rgb(0, 0, 0)
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });

        const fileName =
          dateParts.yyyy +
          dateParts.mm +
          dateParts.dd +
          "_Meldeboard.pdf";

        const link = document.createElement("a");
        const blobUrl = URL.createObjectURL(blob);
        link.href = blobUrl;
        link.download = fileName;

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
      } catch (e) {
        console.error(e);
        alert("PDF konnte nicht erstellt werden: " + (e instanceof Error ? e.message : "Unbekannter Fehler"));
      }
    }

    function scheduleAutoRefresh() {
      setTimeout(async function autoRefresh() {
        const password = document.getElementById("pw").value.trim();
        if (password) {
          await loadMessages(false);
        }
        setTimeout(autoRefresh, AUTO_REFRESH_MS);
      }, AUTO_REFRESH_MS);
    }

    window.addEventListener("resize", fitBoardToViewport);
    scheduleAutoRefresh();

    document.getElementById("pw").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        manualLoad();
      }
    });
  </script>

</body>
</html>

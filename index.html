<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VSR Meldeboard</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f2f2f2;
}

.pageCenter {
  display: flex;
  justify-content: center;
}

.topWrap {
  width: min(100%, 1180px);
}

.card {
  background: #fff;
  padding: 10px 14px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.headerRow {
  display: flex;
  justify-content: space-between;
}

.headerTitle h2 {
  margin: 0;
  color: #c4001a;
}

.logoBox img {
  height: 70px;
}

/* INPUT + BUTTON */
input {
  padding: 8px;
  width: 320px;
  max-width: 100%;
  margin-bottom: 8px;
}

button {
  padding: 8px 14px;
  background: #c92222;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 6px;
}

/* STATUS FIX (kein Springen mehr) */
.statusLine {
  min-height: 24px;
  margin-top: 8px;
  display: flex;
  align-items: center;
}

.ok {
  color: #0a7a2f;
  font-size: 14px;
}

.error {
  color: #b00020;
  font-size: 14px;
}

/* BOARD */
.boardViewport {
  display: flex;
  justify-content: center;
}

.boardScaleStage {
  transform-origin: top center;
}

.boardOuter {
  width: 1320px;
  background: #e53935;
  padding: 12px;
  transition: 0.4s;
}

.flashNew {
  animation: flashGreen 0.8s;
}

@keyframes flashGreen {
  0% { background: #3cb371; }
  100% { background: #e53935; }
}

.boardInner {
  background: #e8e8e8;
  padding: 10px;
}

.boardGrid {
  display: grid;
  grid-template-columns:
    165px 110px 50px 50px 72px 72px 112px 72px 62px 62px 62px 110px;
  column-gap: 25px;
  margin-bottom: 6px;
}

.boardCell {
  border: 3px solid #444;
  min-height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: #e8e8e8;
}

.plusCell {
  position: relative;
}

.plusCell::before {
  content: "+";
  position: absolute;
  left: -25px;
  font-size: 28px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="pageCenter">
  <div class="topWrap">

    <div class="card">
      <div class="headerRow">
        <div class="headerTitle">
          <h2>VSR Meldeboard</h2>
        </div>

        <div class="logoBox">
          <img src="logo.png" alt="Logo">
        </div>
      </div>

      <input id="pw" type="password" placeholder="Passwort eingeben" />

      <div>
        <button onclick="manualLoad()">Meldungen laden</button>
        <button onclick="copyAll()">Alle Kräfte kopieren</button>
      </div>

      <!-- FESTER STATUS -->
      <div id="status" class="statusLine">
        <div class="ok">0 aktuelle Meldung(en) geladen.</div>
      </div>

      <div style="font-size:12px;color:#666;">
        Automatische Aktualisierung alle 10 Sekunden · letzte 6 Stunden
      </div>
    </div>

    <div id="list"></div>

  </div>
</div>

<script>

const url = "https://wjqltuuebwxcymdbydwl.supabase.co/functions/v1/elw-read";
const apiKey = "DEIN_API_KEY";

let lastData = [];

const SIX_HOURS = 6 * 60 * 60 * 1000;

/* ========================= */
/* PARSEN */

function parse(line) {
  const p = String(line).split(";").map(x => x.trim());

  return {
    staffel: p[0] || "",
    abk: getAbk(p[0]),
    ankunft: p[1] || "",
    zf: p[2] || "",
    gf: p[3] || "",
    hf: p[4] || "",
    zh: p[5] || "",
    sth: p[6] || "",
    soh: p[7] || "",
    arzt: p[8] || "",
    br: p[9] || "",
    ta: p[10] || "",
    abreise: p[11] || ""
  };
}

function getAbk(name) {
  return (name || "").substring(0, 3).toUpperCase();
}

/* ========================= */
/* FILTER */

function filterData(data) {
  const now = Date.now();

  const last6h = data.filter(x => {
    const t = new Date(x.created_at).getTime();
    return now - t <= SIX_HOURS;
  });

  // NEUSTE ZUERST
  last6h.sort((a, b) =>
    new Date(b.created_at) - new Date(a.created_at)
  );

  // NUR LETZTE JE STAFFEL
  const map = new Map();

  for (const item of last6h) {
    const staffel = parse(item.meldung).staffel;
    if (!map.has(staffel)) {
      map.set(staffel, item);
    }
  }

  return Array.from(map.values());
}

/* ========================= */
/* RENDER */

function render(data, highlight = false) {

  const rows = data.map(x => parse(x.meldung));

  const html = rows.map(r => `
    <div class="boardGrid">
      <div class="boardCell">${r.abk}</div>
      <div class="boardCell">${r.ankunft}</div>
      <div class="boardCell">${r.zf}</div>
      <div class="boardCell">${r.gf}</div>
      <div class="boardCell">${r.hf}</div>
      <div class="boardCell plusCell">${r.zh}</div>
      <div class="boardCell">${r.sth}</div>
      <div class="boardCell">${r.soh}</div>
      <div class="boardCell">${r.arzt}</div>
      <div class="boardCell">${r.br}</div>
      <div class="boardCell">${r.ta}</div>
      <div class="boardCell">${r.abreise}</div>
    </div>
  `).join("");

  document.getElementById("list").innerHTML = `
    <div class="boardViewport">
      <div class="boardScaleStage">
        <div class="boardOuter ${highlight ? "flashNew" : ""}">
          <div class="boardInner">
            ${html}
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ========================= */
/* LOAD */

async function load() {
  const pw = document.getElementById("pw").value;
  const status = document.getElementById("status");

  if (!pw) {
    status.innerHTML = "<div class='error'>Bitte Passwort eingeben</div>";
    return;
  }

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "x-elw-password": pw,
        "apikey": apiKey
      }
    });

    const data = await res.json();

    const filtered = filterData(data);

    // NEUE ERKENNEN
    const oldIds = new Set(lastData.map(x => x.id));
    const hasNew = filtered.some(x => !oldIds.has(x.id));

    lastData = filtered;

    // STATUS NUR ZAHL ÄNDERN
    status.innerHTML = `<div class="ok">${filtered.length} aktuelle Meldung(en) geladen.</div>`;

    render(filtered, hasNew);

  } catch (err) {
    status.innerHTML = "<div class='error'>Fehler beim Laden</div>";
  }
}

/* ========================= */
/* COPY */

function copyAll() {

  if (!lastData.length) {
    alert("Keine Daten vorhanden");
    return;
  }

  const text = lastData.map(x => {
    const r = parse(x.meldung);
    return [
      r.staffel,
      r.zf,
      r.gf,
      r.hf,
      r.zh,
      r.sth,
      r.soh
    ].join("\t");
  }).join("\n");

  navigator.clipboard.writeText(text);
  alert("Kopiert");
}

/* ========================= */

function manualLoad() {
  load();
}

/* AUTO REFRESH */
setInterval(load, 10000);

</script>

</body>
</html>

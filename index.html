<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSR Kräftemeldungen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 6px 14px 14px;
      background: #f5f5f5;
    }

    .card {
  background: white;
  padding: 8px 12px 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

    .headerRow {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}

    .headerTitle {
      min-width: 0;
      flex: 1;
    }

    .headerTitle h2 {
  margin: 0;
  padding: 0;
  color: #c4001a;
  line-height: 1.1;
  font-size: 2rem;
}

    .logoBox {
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.logoBox img {
  height: 100px;
  width: auto;
  display: block;
  object-fit: contain;
  margin-top: 0;
}

    .topControls {
      margin-top: 0;
    }

    input {
      padding: 9px 10px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 9px 14px;
      background: #c4001a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 4px;
      margin-right: 8px;
    }

    .buttonRow {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      margin-top: 8px;
    }

    .ok {
      color: #0a7a2f;
      margin-top: 8px;
      font-size: 14px;
    }

    .muted {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
    }

    .tableWrap {
      overflow-x: auto;
    }

    .forcesTable {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 14px;
    }

    .forcesTable th,
    .forcesTable td {
      border: 1px solid #444;
      padding: 8px 10px;
    }

    .forcesTable th {
      background: #efefef;
      text-align: center;
    }

    .forcesTable td:first-child,
    .forcesTable th:first-child {
      text-align: left;
      white-space: nowrap;
    }

    .forcesTable td:not(:first-child),
    .forcesTable th:not(:first-child) {
      text-align: center;
      width: 70px;
    }

    .copyCell {
      width: 110px !important;
      text-align: center !important;
      white-space: nowrap;
    }

    .copyBtnSmall {
      padding: 6px 10px;
      margin: 0;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      body {
        padding: 4px 10px 10px;
      }

      .card {
        padding: 10px;
      }

      .headerRow {
        gap: 10px;
        margin-bottom: 6px;
      }

      .headerTitle h2 {
        font-size: 1.6rem;
      }

      .logoBox img {
        height: 60px;
      }

      input {
        max-width: 100%;
      }

      .forcesTable {
        font-size: 12px;
      }

      .forcesTable th,
      .forcesTable td {
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="headerRow">
      <div class="headerTitle">
        <h2>VSR Kräftemeldungen</h2>
      </div>

      <div class="logoBox">
        <img src="logo.png" alt="VSR Logo" />
      </div>
    </div>

    <div class="topControls">
      <input id="pw" type="password" placeholder="Passwort eingeben" />

      <div class="buttonRow">
        <button onclick="manualLoad()">Meldungen laden</button>
        <button onclick="copyAllForces()">Alle Kräfte kopieren</button>
      </div>

      <div id="status"></div>
      <div class="muted">Automatische Aktualisierung aller 2 Minuten</div>
    </div>
  </div>

  <div id="list"></div>

  <script>
    const url = "https://wjqltuuebwxcymdbydwl.supabase.co/functions/v1/elw-read";
    const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWx0dXVlYnd4Y3ltZGJ5ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzAwNTgsImV4cCI6MjA4OTI0NjA1OH0.amTfF56s3OlLeE_H8P_-c_hA9M6IEBu9kF2Z7fdiAmk";

    let lastLoadedData = [];

    function parseForceLine(line) {
      const parts = String(line || "")
        .split(";")
        .map((x) => x.trim())
        .filter((x) => x.length > 0);

      return {
        staffel: parts[0] || "",
        zf: parts[1] || "",
        gf: parts[2] || "",
        hf: parts[3] || "",
        zh: parts[4] || "",
        sth: parts[5] || "",
        soh: parts[6] || ""
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildSingleRowHtml(r) {
      return `
        <table border="1" style="border-collapse:collapse; font-family:Arial,sans-serif; font-size:11pt;">
          <tr>
            <td style="padding:6px 10px; text-align:left;">${escapeHtml(r.staffel)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.gf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.hf)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zh)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.sth)}</td>
            <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.soh)}</td>
          </tr>
        </table>
      `;
    }

    function buildSingleRowText(r) {
      return [
        r.staffel,
        r.zf,
        r.gf,
        r.hf,
        r.zh,
        r.sth,
        r.soh
      ].join("\t");
    }

    async function copyHtmlAndText(html, text, successText = "Kopiert") {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([text], { type: "text/plain" }),
          }),
        ]);
        alert(successText);
      } catch {
        try {
          await navigator.clipboard.writeText(text);
          alert(successText);
        } catch {
          alert("Kopieren fehlgeschlagen");
        }
      }
    }

    function renderTable(data) {
      const list = document.getElementById("list");

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = "";
        return;
      }

      const rows = data.map((item, index) => {
        const parsed = parseForceLine(item.meldung);
        return `
          <tr>
            <td>${escapeHtml(parsed.staffel)}</td>
            <td>${escapeHtml(parsed.zf)}</td>
            <td>${escapeHtml(parsed.gf)}</td>
            <td>${escapeHtml(parsed.hf)}</td>
            <td>${escapeHtml(parsed.zh)}</td>
            <td>${escapeHtml(parsed.sth)}</td>
            <td>${escapeHtml(parsed.soh)}</td>
            <td class="copyCell">
              <button class="copyBtnSmall" type="button" onclick="copySingleForce(${index})">Kopieren</button>
            </td>
          </tr>
        `;
      }).join("");

      list.innerHTML = `
        <div class="card">
          <div class="tableWrap">
            <table class="forcesTable">
              <thead>
                <tr>
                  <th>Staffel</th>
                  <th>ZF</th>
                  <th>GF</th>
                  <th>HF</th>
                  <th>zH</th>
                  <th>STH</th>
                  <th>SOH</th>
                  <th class="copyCell">Aktion</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function loadMessages(showErrors = false) {
      const password = document.getElementById("pw").value.trim();
      const status = document.getElementById("status");
      const list = document.getElementById("list");

      if (!password) {
        status.innerHTML = '<div class="error">Bitte zuerst Passwort eingeben.</div>';
        return;
      }

      status.innerHTML = "";

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-elw-password": password,
            "apikey": apiKey,
            "Authorization": "Bearer " + apiKey
          },
          body: JSON.stringify({})
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Server liefert keine gültige Antwort.");
        }

        if (!res.ok) {
          throw new Error(data.error || data.message || ("HTTP " + res.status));
        }

        lastLoadedData = Array.isArray(data) ? data : [];

        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = "";
          status.innerHTML = '<div class="ok">Keine Meldungen für heute vorhanden.</div>';
          return;
        }

        status.innerHTML = '<div class="ok">' + data.length + ' Meldung(en) geladen.</div>';
        renderTable(data);

      } catch (err) {
        if (showErrors) {
          status.innerHTML =
            '<div class="error">' +
            (err instanceof Error ? err.message : "Unbekannter Fehler") +
            '</div>';
        }
      }
    }

    async function manualLoad() {
      await loadMessages(true);
    }

    async function copySingleForce(index) {
      if (!Array.isArray(lastLoadedData) || !lastLoadedData[index]) {
        alert("Keine Kräftemeldung gefunden.");
        return;
      }

      const parsed = parseForceLine(lastLoadedData[index].meldung);
      const html = buildSingleRowHtml(parsed);
      const text = buildSingleRowText(parsed);

      await copyHtmlAndText(html, text, "Staffel als Tabelle kopiert");
    }

    async function copyAllForces() {
      if (!Array.isArray(lastLoadedData) || lastLoadedData.length === 0) {
        alert("Es sind keine geladenen Kräftemeldungen vorhanden.");
        return;
      }

      const rows = lastLoadedData.map((item) => parseForceLine(item.meldung));

      const htmlTable = `
        <table border="1" style="border-collapse:collapse; font-family:Arial,sans-serif; font-size:11pt;">
          ${rows
            .map(
              (r) => `
            <tr>
              <td style="padding:6px 10px; text-align:left;">${escapeHtml(r.staffel)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.gf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.hf)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.zh)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.sth)}</td>
              <td style="padding:6px 10px; text-align:center;">${escapeHtml(r.soh)}</td>
            </tr>
          `
            )
            .join("")}
        </table>
      `;

      const plainText = rows
        .map((r) =>
          [r.staffel, r.zf, r.gf, r.hf, r.zh, r.sth, r.soh].join("\t")
        )
        .join("\n");

      await copyHtmlAndText(htmlTable, plainText, "Alle Kräfte als Tabelle kopiert");
    }

    // Automatisch alle 2 Minuten neu laden
    setInterval(() => {
      const password = document.getElementById("pw").value.trim();
      if (!password) return;
      loadMessages(false);
    }, 120000);
  </script>

</body>
</html>

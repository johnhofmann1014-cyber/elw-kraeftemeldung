<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSR Kräftemeldungen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .headerRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .headerTitle {
      min-width: 0;
      flex: 1;
    }

    .headerTitle h2 {
      margin: 0;
      color: #c4001a;
    }

    .logoBox {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
    }

    .logoBox img {
      height: 180px;
      width: auto;
      display: block;
      object-fit: contain;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    input {
      padding: 10px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      background: #c4001a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }

    .msg {
      font-family: monospace;
      background: #eee;
      padding: 6px;
      border-radius: 4px;
      margin: 4px 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 11px;
    }

    .time {
      color: #666;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      margin-top: 10px;
    }

    .ok {
      color: #0a7a2f;
      margin-top: 10px;
      font-size: 14px;
    }

    .muted {
      color: #666;
      font-size: 13px;
      margin-top: 6px;
    }

    @media (max-width: 640px) {
      .headerRow {
        align-items: flex-start;
      }

      .logoBox img {
        height: 56px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="headerRow">
      <div class="headerTitle">
        <h2>VSR Kräftemeldungen</h2>
      </div>

      <div class="logoBox">
        <img src="logo.png" alt="VSR Logo" />
      </div>
    </div>

    <div style="margin-top: 14px;">
      <input id="pw" type="password" placeholder="Passwort eingeben" />
      <br />
      <button onclick="manualLoad()">Meldungen laden</button>

      <div id="status"></div>
      <div class="muted">Automatische Aktualisierung aller 2 Minuten</div>
    </div>
  </div>

  <div id="list"></div>

  <script>
    const url = "https://wjqltuuebwxcymdbydwl.supabase.co/functions/v1/elw-read";
    const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWx0dXVlYnd4Y3ltZGJ5ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzAwNTgsImV4cCI6MjA4OTI0NjA1OH0.amTfF56s3OlLeE_H8P_-c_hA9M6IEBu9kF2Z7fdiAmk";

    let lastPassword = "";

    async function loadMessages(showErrors = false) {
      const password = document.getElementById("pw").value.trim();
      const list = document.getElementById("list");
      const status = document.getElementById("status");

      if (!password) {
        status.innerHTML = '<div class="error">Bitte zuerst Passwort eingeben.</div>';
        return;
      }

      lastPassword = password;
      status.innerHTML = "";

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-elw-password": password,
            "apikey": apiKey,
            "Authorization": "Bearer " + apiKey
          },
          body: JSON.stringify({})
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Server liefert keine gültige Antwort.");
        }

        if (!res.ok) {
          throw new Error(data.error || data.message || ("HTTP " + res.status));
        }

        list.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
          status.innerHTML = '<div class="ok">Keine Meldungen für heute vorhanden.</div>';
          return;
        }

        status.innerHTML = '<div class="ok">' + data.length + ' Meldung(en) geladen.</div>';

        data.forEach((item) => {
          const div = document.createElement("div");
          div.className = "card";

          const time = item.created_at
            ? new Date(item.created_at).toLocaleString("de-DE")
            : "-";

          const meldung = String(item.meldung || "");

          div.innerHTML = `
            <div class="time">${time}</div>
            <div class="msg"></div>
            <button type="button">Kopieren</button>
          `;

          div.querySelector(".msg").textContent = meldung;
          div.querySelector("button").addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(meldung);
              alert("Kopiert");
            } catch {
              alert("Kopieren fehlgeschlagen");
            }
          });

          list.appendChild(div);
        });

      } catch (err) {
        if (showErrors) {
          status.innerHTML =
            '<div class="error">' +
            (err instanceof Error ? err.message : "Unbekannter Fehler") +
            '</div>';
        }
      }
    }

    async function manualLoad() {
      await loadMessages(true);
    }

    // Automatisch alle 2 Minuten neu laden
    setInterval(() => {
      const password = document.getElementById("pw").value.trim();

      if (!password) return;

      loadMessages(false);
    }, 120000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kräftemeldung an ELW</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f2f2f2;
      color: #111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .headerRow {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .headerTitle h2 {
      margin: 0;
      color: #c4001a;
      font-size: 1.7rem;
      line-height: 1.05;
    }

    .logoBox img {
      height: 72px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #fff;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .preview {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #676767;
      color: white;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .buttonRow {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 11px 16px;
      background: #c4001a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button.secondary {
      background: #666;
    }

    .ok {
      color: #0a7a2f;
      margin-top: 12px;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      margin-top: 12px;
      font-weight: bold;
    }

    .muted {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      .grid2 {
        grid-template-columns: 1fr;
      }

      .headerTitle h2 {
        font-size: 1.45rem;
      }

      .logoBox img {
        height: 58px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="card">
      <div class="headerRow">
        <div class="headerTitle">
          <h2>Kräftemeldung an ELW</h2>
        </div>

        <div class="logoBox">
          <img src="logo.png" alt="VSR Logo" />
        </div>
      </div>

      <label for="staffel">Staffel</label>
      <select id="staffel">
        <option value="">Bitte auswählen</option>
        <option>BRH RHS Sachsen Ost</option>
        <option>BRH RHS Mittelsachsen</option>
        <option>BRH RHS Südwestsachsen</option>
        <option>BRH RHS Landkreis Leipzig</option>
        <option>BRH RHS Kamenzer Land</option>
        <option>BRH RHS Thüringen Südost</option>
        <option>DRK RHS Leipzig</option>
        <option>DRK RHS Aue Schwarzenberg</option>
        <option>DRK RHS Freital</option>
        <option>DRK RHS Löbau</option>
        <option>DRK RHS Görlitz</option>
        <option>DLRG Leipzig</option>
        <option>ASB RHS Zwickau</option>
        <option>ASB RHS Chemnitz</option>
        <option>ASB RHS Dresden</option>
        <option>ASB RHS Ostthüringen</option>
        <option>JUH RHS Leipzig</option>
        <option>JUH RHS Dresden</option>
      </select>

      <label for="ankunft">Ankunft</label>
      <input id="ankunft" type="time" />

      <div class="grid2">
        <div>
          <label for="zf">ZF</label>
          <input id="zf" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="gf">GF</label>
          <input id="gf" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="hf">HF</label>
          <input id="hf" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="zh">zH</label>
          <input id="zh" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="sth">STH</label>
          <input id="sth" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="soh">SOH</label>
          <input id="soh" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="arzt">Arzt</label>
          <input id="arzt" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="berufsretter">Berufsretter</label>
          <input id="berufsretter" type="number" min="0" step="1" value="0" />
        </div>

        <div>
          <label for="tierarzt">Tierarzt</label>
          <input id="tierarzt" type="number" min="0" step="1" value="0" />
        </div>
      </div>

      <label>Übertragene Meldung</label>
      <div id="preview" class="preview"></div>

      <div class="buttonRow">
        <button onclick="sendForceReport()">Kräftemeldung an ELW schicken</button>
        <button class="secondary" onclick="resetForm()">Zurücksetzen</button>
      </div>

  <div id="status"></div>  
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://wjqltuuebwxcymdbydwl.supabase.co/rest/v1/kraeftemeldung";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqcWx0dXVlYnd4Y3ltZGJ5ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzAwNTgsImV4cCI6MjA4OTI0NjA1OH0.amTfF56s3OlLeE_H8P_-c_hA9M6IEBu9kF2Z7fdiAmk";

    const fieldIds = [
      "staffel",
      "ankunft",
      "zf",
      "gf",
      "hf",
      "zh",
      "sth",
      "soh",
      "arzt",
      "berufsretter",
      "tierarzt"
    ];

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function getNumberValue(id) {
      const value = getValue(id);
      if (!value) return "0";
      return String(Math.max(0, Number(value) || 0));
    }

    function buildReportText() {
      return [
        getValue("staffel"),
        getValue("ankunft"),
        getNumberValue("zf"),
        getNumberValue("gf"),
        getNumberValue("hf"),
        getNumberValue("zh"),
        getNumberValue("sth"),
        getNumberValue("soh"),
        getNumberValue("arzt"),
        getNumberValue("berufsretter"),
        getNumberValue("tierarzt"),
        ""
      ].join("; ");
    }

    function updatePreview() {
      document.getElementById("preview").textContent = buildReportText();
    }

    function resetForm() {
      document.getElementById("staffel").value = "";
      document.getElementById("ankunft").value = "";
      document.getElementById("zf").value = "0";
      document.getElementById("gf").value = "0";
      document.getElementById("hf").value = "0";
      document.getElementById("zh").value = "0";
      document.getElementById("sth").value = "0";
      document.getElementById("soh").value = "0";
      document.getElementById("arzt").value = "0";
      document.getElementById("berufsretter").value = "0";
      document.getElementById("tierarzt").value = "0";
      document.getElementById("status").innerHTML = "";
      updatePreview();
    }

    async function sendForceReport() {
      const status = document.getElementById("status");
      const reportText = buildReportText();

      if (!getValue("staffel")) {
        status.innerHTML = '<div class="error">Bitte zuerst eine Staffel auswählen.</div>';
        return;
      }

      try {
        const res = await fetch(SUPABASE_URL, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json",
            Prefer: "return=minimal",
          },
          body: JSON.stringify({
            meldung: reportText,
          }),
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error("HTTP " + res.status + ": " + errText);
        }

        status.innerHTML = '<div class="ok">Kräftemeldung erfolgreich an ELW geschickt.</div>';
      } catch (e) {
        status.innerHTML =
          '<div class="error">Übertragung fehlgeschlagen: ' +
          (e instanceof Error ? e.message : "Unbekannter Fehler") +
          "</div>";
      }
    }

    for (const id of fieldIds) {
      document.getElementById(id).addEventListener("input", updatePreview);
      document.getElementById(id).addEventListener("change", updatePreview);
    }

    updatePreview();
  </script>

</body>
</html>
